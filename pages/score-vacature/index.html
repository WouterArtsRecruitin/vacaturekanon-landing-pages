<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Score Vacature — Schiet jij je vacature raak?</title>
    <meta
      name="description"
      content="Speel Score Vacature: raak 8 tech-talenten in 25 seconden, vermijd HR & win korting. Een Meta-campagne game door RecruitIn."
    />
    <meta name="theme-color" content="#2c2c2c" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;600&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        color: #f4f4f5;
        background: #0f1012;
        font-family: 'Nunito', sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body { background: radial-gradient(circle at top left, rgba(255, 140, 34, 0.14), transparent 24%), radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.16), transparent 28%), background-color: #0f1012; }
      #root { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .game-shell { width: min(1200px, 100%); min-height: calc(100vh - 48px); background: rgba(15,17,18,.92); border: 1px solid rgba(255,255,255,.08); border-radius: 24px; box-shadow: 0 36px 120px rgba(0,0,0,.35); overflow: hidden; position: relative; }
      .game-shell::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,.04), transparent 34%, rgba(255,255,255,.02)); pointer-events: none; }
      @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes burstFly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-24px) scale(1.05); opacity: 0; } }
      @keyframes ringExpand { 0% { transform: scale(0.5); opacity: 0.5; } 80% { transform: scale(1.4); opacity: 0.2; } 100% { transform: scale(1.6); opacity: 0; } }
      @keyframes flashFade { 0% { opacity: 0.35; } 100% { opacity: 0; } }
      @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-4px); } }
      @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.05); } }
      @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0px); } 50% { transform: translateX(-50%) translateY(-2px); } }
      @keyframes wave { 0%, 100% { transform: translateX(-50%) rotate(0deg); } 25% { transform: translateX(-50%) rotate(5deg); } 75% { transform: translateX(-50%) rotate(-5deg); } }
      @keyframes walk { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(1px); } }
      @keyframes pulseBar { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      crossorigin
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/@babel/standalone@7.25.0/babel.min.js"
    ></script>
    <script type="text/babel" src="game.jsx"></script>
  </body>
</html>
