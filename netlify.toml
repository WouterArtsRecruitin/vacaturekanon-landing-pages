[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=300, stale-while-revalidate=60"

# /slug → /pages/slug/index.html (rewrite, niet redirect)
[[redirects]]
  from = "/:slug"
  to = "/pages/:slug/index.html"
  status = 200

[[redirects]]
  from = "/:slug/"
  to = "/pages/:slug/index.html"
  status = 200
