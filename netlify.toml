[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=300, stale-while-revalidate=60"

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
